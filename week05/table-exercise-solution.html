<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Rapids Rafting Company</title>

    <meta name="description"
      content="Practice HTML tables for Rapids Rafting Company showing league data with rows, columns, and styling examples.">

    <meta name="author" content="Halaevalu Muti">

    <link rel="stylesheet" href="styles/table.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rapids Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Table Exercise Example Solution</h1>

        <table>
            <thead>
                <tr>
                    <th>League</th>
                    <th>Team</th>
                    <th>Record</th>
                    <th>Player Count</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th rowspan="2">Southern</th>
                    <td>Parana</td>
                    <td>52-19</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>Catarina</td>
                    <td>49-24</td>
                    <td>10</td>
                </tr>

                <tr>
                    <th rowspan="3">Western</th>
                    <td>Lacerda</td>
                    <td>92-70</td>
                    <td>27</td>
                </tr>
                <tr>
                    <td>Acre</td>
                    <td>75-87</td>
                    <td>20</td>
                </tr>
                <tr>
                    <td>Rondonia</td>
                    <td>10-7</td>
                    <td>12</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <th colspan="3">Total Players</th>
                    <td>92</td>
                </tr>
            </tfoot>
        </table>

    </main>

    <footer>
        <p>© 2026 Rapids Rafting Company | Halaevalu Muti</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>

</body>

</html>
