<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Xavier Rodriquez">
</head>

<body>

    <header>
        <img src="images/basic-logo.png" alt="Website Logo" width="128" height="128">
    </header>

    <nav>
        <ul>
            <li><a href="https://www.example.com">Example Site 1</a></li>
            <li><a href="https://www.wikipedia.org">Example Site 2</a></li>
        </ul>
    </nav>

    <main>
        <h1>Basic HTML Structure</h1>

        <section>
            <h2>Heading One</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </section>

        <section>
            <h2>Heading Two</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </section>
    </main>

    <aside>
        <img src="images/abidjan-ivory-coast.jpeg" alt="Temple Image" width="150px">
    </aside>

    <footer>
        <p>🌴 Xavier Rodriquez</p>
    </footer>

</body>

</html>
