<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact Rapids Rafting Company for reservations, questions, or feedback. Find our location and meet our team.">
    <meta name="author" content="Halaevalu Muti">
    <title>Contact Us | Rapids Rafting Company</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rapids Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>

        <section>
            <h2>Contact Information</h2>
            <p>Address: 123 River Road, Idaho</p>
            <p>Phone: (555) 123-4567</p>
            <p>Email: info@rapidsrafting.com</p>
        </section>

        <section>
            <h2>Find Us</h2>
            <iframe src="https://www.google.com/maps/embed?pb=..."></iframe>
        </section>

        <section>
            <h2>Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Alex, Senior Rafting Guide">
                <img src="images/employee2.jpg" alt="Maria, Safety Instructor">
                <img src="images/employee3.jpg" alt="John, River Expert Guide">
            </figure>
        </section>

        <section>
            <h2>Send Us a Message</h2>

            <form>
                <form>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">

                    <p>Purpose of Message</p>

                    <input type="radio" id="purpose-general" name="purpose" value="general">
                    <label for="purpose-general">General Inquiry</label>

                    <input type="radio" id="purpose-reservation" name="purpose" value="reservation">
                    <label for="purpose-reservation">Reservation Question</label>

                    <input type="radio" id="purpose-suggestion" name="purpose" value="suggestion">
                    <label for="purpose-suggestion">Website Suggestion</label>

                    <label for="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>
                </form>
        </section>

    </main>

    <footer>
        <p>© 2026 Rapids Rafting Company | Halaevalu Muti</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook social media icon"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter social media icon"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram social media icon"></a>
        </nav>
    </footer>

</body>

</html>
