<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact Rapids Rafting Company for reservations, questions, or feedback. Find our location and meet our team.">
    <meta name="author" content="Halaevalu Muti">

    <title>About Us | Rapids Rafting Company</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rapids Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>

        <!-- Company Info -->
        <section>
            <h2>Contact Information</h2>
            <p>Address: 123 River Road, Idaho</p>
            <p>Phone: (555) 123-4567</p>
            <p>Email: info@rapidsrafting.com</p>
        </section>

        <!-- Google Map -->
        <section>
            <h2>Find Us</h2>
            <iframe src="YOUR_GOOGLE_MAP_EMBED_CODE_HERE"></iframe>
        </section>

        <!-- Employees -->
        <section>
            <h2>Our Team</h2>
            <figure>
                <img src="images/employee1.jpg" alt="Guide Alex">
                <figcaption>Alex - Senior Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="Guide Maria">
                <figcaption>Maria - Safety Instructor</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="Guide John">
                <figcaption>John - River Expert</figcaption>
            </figure>
        </section>

        <!-- Contact Form -->
        <section>
            <h2>Send Us a Message</h2>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <p>Purpose of Message</p>
                <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
                <label><input type="radio" name="purpose" value="reservation"> Reservation
                    Question</label>
                <label><input type="radio" name="purpose" value="suggestion"> Website
                    Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <label><input type="checkbox" name="newsletter"> Please subscribe me to the monthly
                    newsletter</label>

                <button type="submit">Send Message</button>
            </form>
        </section>

    </main>

    <footer>
        <p>© 2026 Rafting Company</p>

        <nav class="socialmedia">
            <a href="#">
                <img src="images/facebook.png" alt="Facebook">
            </a>

            <a href="#">
                <img src="images/twitter.png" alt="Twitter">
            </a>

            <a href="#">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
